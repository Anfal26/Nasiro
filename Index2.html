<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasir Slides</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 300px;
            transition: all 0.5s ease;
        }
        .hidden { display: none; }
        
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { background-color: #0056b3; }

        .name-list {
            list-style: none;
            padding: 0;
            font-size: 20px;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="slide1" class="container">
        <h1>Welcome</h1>
        <p>Click below to open the list.</p>
        <button onclick="showSlide2()">Open It</button>
    </div>

    <div id="slide2" class="container hidden">
        <ul id="list" class="name-list"></ul>
        <button onclick="showSlide1()">Go Back</button>
    </div>

    <script>
        function showSlide2() {
            const list = document.getElementById('list');
            list.innerHTML = ''; // Clear previous
            
            // Logic to write Nasir 10 times
            for (let i = 0; i < 10; i++) {
                let li = document.createElement('li');
                li.textContent = (i + 1) + ". Nasir";
                list.appendChild(li);
            }

            document.getElementById('slide1').classList.add('hidden');
            document.getElementById('slide2').classList.remove('hidden');
        }

        function showSlide1() {
            document.getElementById('slide2').classList.add('hidden');
            document.getElementById('slide1').classList.remove('hidden');
        }
    </script>

</body>
</html>
